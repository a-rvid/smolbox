name: build
on:
    push:
        branches: [ master ]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@main
          - run: make
          - uses: actions/upload-artifact@v7
            with:
                name: smolbox
                path: smolbox
                if-no-files-found: error
                archive: false