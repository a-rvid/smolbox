name: build
permissions:
  contents: read

on:
    push:
        branches: [ master ]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@main
            with:
                submodules: true

          - name: install dependencies
            run: sudo apt update -y && sudo apt install -y gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf

          - name: build for x86_64
            run: make

          - run: make build-deb
          - run: mv smolbox smolbox-x86_64

          - uses: actions/upload-artifact@v7
            with:
                name: smolbox-x86_64
                path: smolbox-x86_64
                if-no-files-found: error
                archive: false
          - uses: actions/upload-artifact@v7
            with:
                name: smolbox-x86_64.deb
                path: smolbox-x86_64.deb
                if-no-files-found: error
                archive: false

          - name: build for arm
            run: OBJCOPY=arm-linux-gnueabihf-objcopy CC=arm-linux-gnueabihf-gcc make
